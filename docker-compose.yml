services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: pokerag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pokerag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: pokerag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: pokerag-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "gemma4:e4b"]
    restart: "no"

  app:
    build: .
    container_name: pokerag-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma4:e4b
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    command: >
      sh -c "python data_loader/pokemon_loader.py &&
             streamlit run streamlit_app/app.py
             --server.address=0.0.0.0 --server.port=8501"
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  ollama_data:
